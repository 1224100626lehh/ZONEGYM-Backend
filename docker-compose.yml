services:
    mongo:
        image: mongo:7
        container_name: zonegym-mongo
        ports:
            - "27017:27017"
        volumes:
            - mongo-data:/data/db

    backend:
        build: .
        container_name: zonegym-backend
        ports:
            - "5000:5000"
        depends_on:
            - mongo
        environment:
            MONGO_URI: mongodb://mongo:27017/zonegym
            PORT: 5000

volumes:
    mongo-data:
